<style>

  .btn { display:inline-flex; align-items:center; gap:8px; padding:10px 20px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; transition:all .15s; border:none; }
  .btn-primary { background:#4f46e5; color:white; } .btn-primary:hover { background:#4338ca; }
  .btn-secondary { background:white; color:#1e293b; border:1px solid #e2e8f0; } .btn-secondary:hover { background:#f8fafc; }

  .btn-sm { padding:6px 12px; font-size:12px; }

  .input { width:100%; padding:10px 14px; border:1px solid #e2e8f0; border-radius:10px; font-size:14px; transition:all .15s; background:white; }

    .flow-canvas { background: #f8fafc; background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; min-height: 400px; position: relative; overflow: hidden; border: 1px solid #e2e8f0; border-radius: 12px; }
    .flow-node { position: absolute; background: white; border: 2px solid #e2e8f0; border-radius: 12px; padding: 12px 16px; min-width: 160px; cursor: move; user-select: none; transition: border-color .15s, box-shadow .15s; }

    .flow-node.selected { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(99,102,241,.2); }
    .flow-node-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }

    .node-palette-item:hover { border-color: #818cf8; background: #eef2ff; }
    .ai-chat { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .ai-msg { padding: 10px 14px; border-radius: 12px; font-size: 13px; max-width: 85%; line-height: 1.5; }
    .ai-msg-user { background: #4f46e5; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .ai-msg-bot { background: #f1f5f9; color: #334155; align-self: flex-start; border-bottom-left-radius: 4px; }

<body>
<div id="app"></div>
<script>
// ═══════════════════════════════════════════════════════════════════
// NEXUS OS BUSINESS — Complete Standalone Application
// ═══════════════════════════════════════════════════════════════════

// ─── Database (localStorage) ───────────────────────────────────────
const DB_KEY = 'nexus_os_db';
function loadDB() {
  const raw = localStorage.getItem(DB_KEY);
  if (raw) return JSON.parse(raw);
  return { users:[], orgs:[], workspaces:[], members:[], entities:[], records:[], websites:[], automations:[], bots:[], agents:[], marketplace:[], packages:[] };
}
function saveDB(db) { localStorage.setItem(DB_KEY, JSON.stringify(db)); }
function genId() { return Math.random().toString(36).slice(2,11) + Date.now().toString(36); }
function now() { return new Date().toISOString(); }

// ─── Auth ──────────────────────────────────────────────────────────
const AUTH_KEY = 'nexus_auth';
function getAuth() { try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch { return null; } }
function setAuth(a) { localStorage.setItem(AUTH_KEY, JSON.stringify(a)); }
function clearAuth() { localStorage.removeItem(AUTH_KEY); }
function hashPw(pw) { return btoa(pw); } // simplified for demo

// ─── State ─────────────────────────────────────────────────────────
let db = loadDB();
let auth = getAuth();
let currentPage = 'dashboard';
let wsId = null;
let toasts = [];

function toast(msg, type='success') {
  const id = genId();
  toasts.push({ id, msg, type });
  render();
  setTimeout(() => { toasts = toasts.filter(t => t.id !== id); render(); }, 3500);
}

function navigate(page) {
  currentPage = page;
  render();
}

// ─── Seed Demo Data ────────────────────────────────────────────────
function seedDemo() {
  if (db.users.length > 0) return;
  const uid = genId(), orgId = genId(), wid = genId();
  db.users.push({ id:uid, email:'demo@nexusos.com', name:'Demo User', passwordHash:hashPw('demo1234'), createdAt:now() });
  db.orgs.push({ id:orgId, name:'Demo Organization', slug:'demo-org', createdAt:now() });
  db.workspaces.push({ id:wid, orgId, name:'My Workspace', slug:'default', createdAt:now() });
  db.members.push({ id:genId(), wsId:wid, userId:uid, role:'owner' });

  const cid = genId(), did = genId(), tid = genId();
  db.entities.push(
    { id:cid, wsId:wid, name:'contacts', displayName:'Contacts', icon:'👤', color:'#6366f1', fields:[
      {name:'first_name',type:'text',label:'First Name',required:true},{name:'last_name',type:'text',label:'Last Name',required:true},
      {name:'email',type:'email',label:'Email'},{name:'phone',type:'phone',label:'Phone'},
      {name:'company',type:'text',label:'Company'},{name:'status',type:'select',label:'Status',required:true,options:[{label:'Lead',value:'lead'},{label:'Customer',value:'customer'},{label:'Partner',value:'partner'}]}
    ], createdAt:now() },
    { id:did, wsId:wid, name:'deals', displayName:'Deals', icon:'📈', color:'#10b981', fields:[
      {name:'title',type:'text',label:'Deal Title',required:true},{name:'value',type:'currency',label:'Value',required:true},
      {name:'contact',type:'text',label:'Contact'},{name:'stage',type:'select',label:'Stage',required:true,options:[{label:'New',value:'new'},{label:'Qualified',value:'qualified'},{label:'Proposal',value:'proposal'},{label:'Won',value:'won'},{label:'Lost',value:'lost'}]}
    ], createdAt:now() },
    { id:tid, wsId:wid, name:'tasks', displayName:'Tasks', icon:'✅', color:'#f59e0b', fields:[
      {name:'title',type:'text',label:'Title',required:true},{name:'description',type:'textarea',label:'Description'},
      {name:'due_date',type:'date',label:'Due Date'},{name:'priority',type:'select',label:'Priority',required:true,options:[{label:'Low',value:'low'},{label:'Medium',value:'medium'},{label:'High',value:'high'}]},
      {name:'status',type:'select',label:'Status',required:true,options:[{label:'To Do',value:'todo'},{label:'In Progress',value:'in_progress'},{label:'Done',value:'done'}]}
    ], createdAt:now() }
  );

  [
    {first_name:'Alice',last_name:'Johnson',email:'alice@example.com',phone:'+1 555-0101',company:'TechCorp',status:'customer'},
    {first_name:'Bob',last_name:'Smith',email:'bob@example.com',phone:'+1 555-0102',company:'StartupXYZ',status:'lead'},
    {first_name:'Carol',last_name:'Williams',email:'carol@example.com',phone:'+1 555-0103',company:'BigCo',status:'partner'},
    {first_name:'David',last_name:'Brown',email:'david@example.com',phone:'+1 555-0104',company:'NewVenture',status:'lead'},
    {first_name:'Eva',last_name:'Martinez',email:'eva@example.com',phone:'+1 555-0105',company:'GlobalInc',status:'customer'},
  ].forEach(d => db.records.push({ id:genId(), wsId:wid, entityId:cid, data:d, createdAt:now() }));

  [
    {title:'Enterprise License',value:50000,contact:'Alice Johnson',stage:'proposal'},
    {title:'Startup Package',value:12000,contact:'Bob Smith',stage:'qualified'},
    {title:'Consulting Project',value:25000,contact:'Carol Williams',stage:'won'},
    {title:'Annual Subscription',value:8000,contact:'David Brown',stage:'new'},
  ].forEach(d => db.records.push({ id:genId(), wsId:wid, entityId:did, data:d, createdAt:now() }));

  [
    {title:'Prepare proposal for TechCorp',priority:'high',status:'in_progress',due_date:'2026-07-20'},
    {title:'Follow up with Bob',priority:'medium',status:'todo',due_date:'2026-07-18'},
    {title:'Send contract to BigCo',priority:'high',status:'todo',due_date:'2026-07-22'},
  ].forEach(d => db.records.push({ id:genId(), wsId:wid, entityId:tid, data:d, createdAt:now() }));

  db.automations.push(
    { id:genId(), wsId:wid, name:'Lead Follow-up', description:'Send follow-up email to new leads', trigger:{type:'event',event:'contact.created'}, active:true, executions:12, createdAt:now() },
    { id:genId(), wsId:wid, name:'Deal Won Notification', description:'Notify team when deal is won', trigger:{type:'event',event:'deal.won'}, active:true, executions:5, createdAt:now() }
  );
  db.bots.push({ id:genId(), wsId:wid, name:'Support Bot', type:'support', description:'Handles customer support inquiries', channels:['web','whatsapp'], active:true, createdAt:now() });
  db.agents.push({ id:genId(), wsId:wid, name:'Sales Assistant', role:'sales', description:'Lead qualification and deal management', tools:['crm','email','calendar'], active:true, createdAt:now() });
  db.websites.push({ id:genId(), wsId:wid, name:'My Business Website', slug:'my-business', published:true, pages:['Home','About','Services','Contact'], createdAt:now() });

  db.marketplace.push(
    { id:genId(), type:'package', name:'Dental Clinic Pro', desc:'Complete dental clinic with CRM, website, appointment bot', category:'healthcare', rating:4.9, installs:1240, price:'Free', status:'published' },
    { id:genId(), type:'crm_template', name:'Real Estate CRM', desc:'CRM for agencies with properties, leads, deals', category:'realestate', rating:4.7, installs:560, price:'$49', status:'published' },
    { id:genId(), type:'bot', name:'Sales Closer Bot', desc:'AI sales bot that qualifies and closes 24/7', category:'sales', rating:4.8, installs:340, price:'$39/mo', status:'published' },
    { id:genId(), type:'automation', name:'Lead Nurture Flow', desc:'7-step email nurture with AI personalization', category:'marketing', rating:4.8, installs:890, price:'Free', status:'published' },
    { id:genId(), type:'agent', name:'SEO Agent Pro', desc:'Autonomous SEO optimization and rank tracking', category:'marketing', rating:4.6, installs:340, price:'$49/mo', status:'published' },
    { id:genId(), type:'website_template', name:'Restaurant Suite', desc:'Menu, reservations, delivery, reviews', category:'restaurant', rating:4.8, installs:980, price:'$29/mo', status:'published' }
  );

  saveDB(db);
}
seedDemo();
db = loadDB();

// ─── Helper Functions ──────────────────────────────────────────────
function getWs() { return db.workspaces.find(w => w.id === wsId); }
function getWsEntities() { return db.entities.filter(e => e.wsId === wsId); }
function getEntityRecords(eid) { return db.records.filter(r => r.wsId === wsId && r.entityId === eid); }
function fmtDate(d) { return new Date(d).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'}); }
function fmtCurrency(v) { return '$' + Number(v).toLocaleString(); }
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ─── Render ────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  if (!auth) { app.innerHTML = renderAuth(); bindAuth(); return; }
  if (!wsId && auth.workspaces.length) wsId = auth.workspaces[0].id;
  app.innerHTML = renderShell();
  bindShell();
}

// ═══════════════════════════════════════════════════════════════════
// AUTH PAGE
// ═══════════════════════════════════════════════════════════════════
let authMode = 'login';
function renderAuth() {
  return `
  <div style="display:flex;min-height:100vh">
    <div style="width:50%;background:#0f172a;color:white;display:flex;flex-direction:column;justify-content:between;padding:48px;position:relative;overflow:hidden" class="hidden lg:flex">
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(99,102,241,.15),transparent 60%)"></div>
      <div style="position:relative;z-index:1">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:64px">
          <div style="width:40px;height:40px;border-radius:12px;background:#6366f1;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px">N</div>
          <span style="font-size:20px;font-weight:700">Nexus OS</span>
        </div>
        <h2 style="font-size:36px;font-weight:800;line-height:1.2;margin-bottom:24px">Build any business<br><span style="color:#818cf8">in minutes.</span></h2>
        <p style="color:rgba(255,255,255,.6);font-size:16px;max-width:420px">Universal business operating system with AI-powered CRM, websites, automations, and intelligent agents — all in one platform.</p>
      </div>
      <div style="position:relative;z-index:1;display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
        ${['AI First','Modular','API First','Low-Code','Multi-Tenant','Cloud Native'].map(f=>`<div style="background:rgba(255,255,255,.05);border-radius:8px;padding:8px 12px;font-size:12px;color:rgba(255,255,255,.4);border:1px solid rgba(255,255,255,.05)">${f}</div>`).join('')}
      </div>
    </div>
    <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:32px;background:#f8fafc">
      <div style="width:100%;max-width:420px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:40px" class="lg:hidden">
          <div style="width:40px;height:40px;border-radius:12px;background:#4f46e5;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:white">N</div>
          <span style="font-size:20px;font-weight:700">Nexus OS</span>
        </div>
        <h3 style="font-size:24px;font-weight:700;margin-bottom:4px">${authMode==='login'?'Welcome back':'Create your account'}</h3>
        <p style="color:#64748b;font-size:14px;margin-bottom:32px">${authMode==='login'?'Sign in to your workspace':'Start building your business in minutes'}</p>
        <form id="authForm" style="display:flex;flex-direction:column;gap:16px">
          ${authMode==='register'?`<div><label style="display:block;font-size:12px;font-weight:500;color:#475569;margin-bottom:6px">Full Name</label><input class="input" id="authName" placeholder="John Doe" required></div>
          <div><label style="display:block;font-size:12px;font-weight:500;color:#475569;margin-bottom:6px">Organization</label><input class="input" id="authOrg" placeholder="My Company"></div>`:''}
          <div><label style="display:block;font-size:12px;font-weight:500;color:#475569;margin-bottom:6px">Email</label><input class="input" id="authEmail" type="email" placeholder="you@company.com" required></div>
          <div><label style="display:block;font-size:12px;font-weight:500;color:#475569;margin-bottom:6px">Password</label><input class="input" id="authPw" type="password" placeholder="••••••••" required minlength="6"></div>
          <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center">${authMode==='login'?'Sign In':'Create Account'}</button>
        </form>
        <p style="text-align:center;font-size:14px;color:#64748b;margin-top:24px">
          ${authMode==='login'?"Don't have an account? ":"Already have an account? "}
          <button onclick="authMode='${authMode==='login'?'register':'login'}';render()" style="color:#4f46e5;font-weight:600;background:none;border:none;cursor:pointer">${authMode==='login'?'Sign up':'Sign in'}</button>
        </p>
      </div>
    </div>
  </div>`;
}
function bindAuth() {
  const form = document.getElementById('authForm');
  if (!form) return;
  form.onsubmit = (e) => {
    e.preventDefault();
    const email = document.getElementById('authEmail').value;
    const pw = document.getElementById('authPw').value;
    if (authMode === 'login') {
      const user = db.users.find(u => u.email === email && u.passwordHash === hashPw(pw));
      if (!user) { toast('Invalid credentials','error'); return; }
      const memberships = db.members.filter(m => m.userId === user.id);
      const workspaces = memberships.map(m => { const ws = db.workspaces.find(w=>w.id===m.wsId); return ws ? {id:ws.id,name:ws.name,role:m.role} : null; }).filter(Boolean);
      auth = { user:{id:user.id,email:user.email,name:user.name}, workspaces };
      setAuth(auth); wsId = workspaces[0]?.id; toast('Welcome back!'); render();
    } else {
      const name = document.getElementById('authName').value;
      const org = document.getElementById('authOrg').value || name+"'s Organization";
      if (db.users.find(u=>u.email===email)) { toast('Email already registered','error'); return; }
      const uid=genId(), oid=genId(), wid=genId();
      db.users.push({id:uid,email,name,passwordHash:hashPw(pw),createdAt:now()});
      db.orgs.push({id:oid,name:org,slug:org.toLowerCase().replace(/[^a-z0-9]+/g,'-'),createdAt:now()});
      db.workspaces.push({id:wid,orgId:oid,name:'Default Workspace',slug:'default',createdAt:now()});
      db.members.push({id:genId(),wsId:wid,userId:uid,role:'owner'});
      saveDB(db);
      auth = { user:{id:uid,email,name}, workspaces:[{id:wid,name:'Default Workspace',role:'owner'}] };
      setAuth(auth); wsId = wid; toast('Account created! Welcome to Nexus OS.'); render();
    }
  };
}

// ═══════════════════════════════════════════════════════════════════
// MAIN SHELL
// ═══════════════════════════════════════════════════════════════════
let sidebarOpen = true;
function renderShell() {
  return `
  <div style="display:flex;min-height:100vh">
    ${renderSidebar()}
    <main style="flex:1;margin-left:${sidebarOpen?'256px':'68px'};transition:margin-left .3s;min-height:100vh;background:#f8fafc">
      <div style="padding:24px;max-width:1400px;margin:0 auto" class="fade-in">
        ${renderPage()}
      </div>
    </main>
  </div>
  ${renderModal()}
  ${renderToasts()}`;
}

function renderSidebar() {
  const nav = [
    {id:'dashboard',label:'Dashboard',icon:'📊'},{id:'crm',label:'CRM',icon:'🗃️'},{id:'websites',label:'Websites',icon:'🌐'},
    {id:'automations',label:'Automations',icon:'⚡'},{id:'bots',label:'AI Bots',icon:'🤖'},{id:'agents',label:'AI Agents',icon:'👤'},
    {id:'generator',label:'Generator',icon:'✨'},{id:'leads',label:'Lead Gen',icon:'🎯'},{id:'marketplace',label:'Marketplace',icon:'🛒'},{id:'packages',label:'Packages',icon:'📦'},{id:'settings',label:'Settings',icon:'⚙️'}
  ];
  return `
  <aside style="position:fixed;left:0;top:0;bottom:0;width:${sidebarOpen?256:68}px;background:#0f172a;color:white;display:flex;flex-direction:column;z-index:40;transition:width .3s">
    <div style="display:flex;align-items:center;gap:12px;padding:0 16px;height:64px;border-bottom:1px solid rgba(255,255,255,.1)">
      <div style="width:32px;height:32px;border-radius:8px;background:#6366f1;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0">N</div>
      ${sidebarOpen?`<div style="overflow:hidden"><h1 style="font-size:14px;font-weight:700">Nexus OS</h1><p style="font-size:10px;color:rgba(255,255,255,.4)">Business Platform</p></div>`:''}
      <button onclick="sidebarOpen=!sidebarOpen;render()" style="margin-left:auto;background:none;border:none;color:rgba(255,255,255,.4);cursor:pointer;padding:4px;font-size:16px">${sidebarOpen?'◂':'▸'}</button>
    </div>
    ${sidebarOpen?`<div style="padding:12px 12px;border-bottom:1px solid rgba(255,255,255,.1)">
      <select onchange="wsId=this.value;render()" style="width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 10px;font-size:12px;color:rgba(255,255,255,.8)">
        ${db.workspaces.filter(w=>db.members.some(m=>m.wsId===w.id&&m.userId===auth.user.id)).map(w=>`<option value="${w.id}" ${w.id===wsId?'selected':''}>${w.name}</option>`).join('')}
      </select>
    </div>`:''}

let selectedEntityId = null;
let selectedEntityTab = 'list';
let modalState = null;

function openModal(type, data) { modalState = {type,data}; render(); }
function closeModal() { modalState = null; render(); }

function renderModal() {
  if (!modalState) return '';
  const m = modalState;
  let content = '';
  if (m.type === 'createEntity') content = renderCreateEntityModal();
  else if (m.type === 'createRecord') content = renderCreateRecordModal();
  else if (m.type === 'createWebsite') content = renderCreateWebsiteModal();
  else if (m.type === 'createAutomation') content = renderCreateAutomationModal();
  else if (m.type === 'createBot') content = renderCreateBotModal();
  else if (m.type === 'createAgent') content = renderCreateAgentModal();
  else if (m.type === 'createPackage') content = renderCreatePackageModal();
  if (!content) return '';
  return `<div class="modal-bg" style="position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px" onclick="closeModal()">
    <div style="background:white;border-radius:16px;box-shadow:0 25px 50px rgba(0,0,0,.25);width:100%;max-width:520px;max-height:90vh;overflow-y:auto" onclick="event.stopPropagation()" class="fade-in">${content}</div>
  </div>`;
}

function renderPage() {
  const pages = { dashboard:renderDashboard, crm:renderCRM, websites:renderWebsites, automations:renderAutomations,
    leads:renderLeads, bots:renderBots, agents:renderAgents, generator:renderGenerator, marketplace:renderMarketplace, packages:renderPackages, settings:renderSettings };
  return (pages[currentPage] || renderDashboard)();
}

          ${ents.map(e=>`<a onclick="selectedEntityId='${e.id}';render()" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;${selectedEntityId===e.id?'background:#eef2ff;color:#4f46e5;font-weight:600':'color:#334155'}">

          <p style="font-size:48px;margin-bottom:16px">🗃️</p><h3 style="font-weight:700;margin-bottom:8px">No Entities Yet</h3>

            <div><h2 style="font-weight:700">${sel.displayName}</h2><p style="font-size:12px;color:#64748b">${recs.length} records · ${sel.fields.length} fields</p></div>

          <div style="display:flex;gap:8px">
            <div style="display:flex;background:#f1f5f9;border-radius:8px;padding:2px">
              <button onclick="selectedEntityTab='list';render()" style="padding:6px 10px;border-radius:6px;border:none;cursor:pointer;font-size:12px;${selectedEntityTab==='list'?'background:white;box-shadow:0 1px 3px rgba(0,0,0,.1)':'background:transparent;color:#64748b'}">☰ List</button>
              <button onclick="selectedEntityTab='grid';render()" style="padding:6px 10px;border-radius:6px;border:none;cursor:pointer;font-size:12px;${selectedEntityTab==='grid'?'background:white;box-shadow:0 1px 3px rgba(0,0,0,.1)':'background:transparent;color:#64748b'}">⊞ Grid</button>

function renderRecordTable(entity, records) {
  const fields = entity.fields.slice(0,6);
  return `<div class="table-wrap"><table><thead><tr>${fields.map(f=>`<th>${f.label}</th>`).join('')}<th style="width:40px"></th></tr></thead>
    <tbody>${records.map(r=>`<tr>${fields.map(f=>`<td>${renderCell(f.type, r.data[f.name])}</td>`).join('')}
      <td><button onclick="deleteRecord('${r.id}')" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px" title="Delete">🗑</button></td></tr>`).join('')}</tbody></table></div>`;
}

function renderRecordGrid(entity, records) {
  return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">
    ${records.map(r=>`<div class="card-hover" style="background:white;border:1px solid #e2e8f0;border-radius:12px;padding:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:12px">
        <h4 style="font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.data[entity.fields[0]?.name]||'Untitled'}</h4>
        <button onclick="deleteRecord('${r.id}')" style="background:none;border:none;cursor:pointer;color:#94a3b8">🗑</button>
      </div>
      ${entity.fields.slice(1,5).filter(f=>r.data[f.name]).map(f=>`<div style="display:flex;gap:8px;font-size:12px;margin-bottom:6px">
        <span style="color:#94a3b8;width:80px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.label}:</span>
        <span style="color:#334155">${renderCell(f.type, r.data[f.name])}</span>
      </div>`).join('')}
      <p style="font-size:10px;color:#94a3b8;margin-top:12px">${fmtDate(r.createdAt)}</p>
    </div>`).join('')}
  </div>`;
}

function renderCell(type, val) {
  if (val===undefined||val===null||val==='') return '<span style="color:#cbd5e1">—</span>';
  if (type==='email') return `<a href="mailto:${val}" style="color:#4f46e5">${val}</a>`;
  if (type==='phone') return `<a href="tel:${val}" style="color:#4f46e5">${val}</a>`;
  if (type==='currency') return `<span style="font-weight:600">${fmtCurrency(val)}</span>`;
  if (type==='select') return `<span class="badge badge-blue">${val}</span>`;
  if (type==='boolean') return val?'<span class="badge badge-green">Yes</span>':'<span class="badge badge-gray">No</span>';
  if (type==='rating') return '<span style="color:#f59e0b">'+'★'.repeat(val)+'☆'.repeat(5-val)+'</span>';
  return esc(String(val));
}

function deleteRecord(id) {
  db.records = db.records.filter(r=>r.id!==id);
  saveDB(db); toast('Record deleted'); render();
}

  return `<div style="padding:24px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between">

function submitCreateEntity(e) {
  e.preventDefault();
  const name = document.getElementById('eName').value;
  const color = document.getElementById('eColor').value;
  db.entities.push({ id:genId(), wsId, name:name.toLowerCase().replace(/\s+/g,'_'), displayName:name, icon:'📁', color,
    fields:[{name:'name',type:'text',label:'Name',required:true},{name:'email',type:'email',label:'Email'},{name:'phone',type:'phone',label:'Phone'},
      {name:'status',type:'select',label:'Status',options:[{label:'Active',value:'active'},{label:'Inactive',value:'inactive'}]}], createdAt:now() });
  saveDB(db); closeModal(); toast('Entity "'+name+'" created');
}

function renderCreateRecordModal() {
  const ent = db.entities.find(e=>e.id===selectedEntityId);
  if (!ent) return '';
  return `<div style="padding:24px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between">
    <h3 style="font-weight:700">Add ${ent.displayName} Record</h3><button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8">✕</button></div>
    <form onsubmit="submitCreateRecord(event)" style="padding:24px;display:flex;flex-direction:column;gap:16px">
      ${ent.fields.map(f=>`<div><label style="display:block;font-size:12px;font-weight:500;color:#475569;margin-bottom:6px">${f.label}${f.required?' <span style="color:#dc2626">*</span>':''}</label>
        ${f.type==='textarea'?`<textarea class="input textarea" id="r_${f.name}" placeholder="${f.label}"></textarea>`:
        f.type==='select'?`<select class="input" id="r_${f.name}"><option value="">Select...</option>${(f.options||[]).map(o=>`<option value="${o.value}">${o.label}</option>`).join('')}</select>`:
        `<input class="input" id="r_${f.name}" type="${f.type==='currency'||f.type==='number'?'number':f.type==='email'?'email':f.type==='phone'?'tel':f.type==='date'?'date':f.type==='datetime'?'datetime-local':'text'}" placeholder="${f.label}">`}</div>`).join('')}
      <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:8px;border-top:1px solid #e2e8f0">
        <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button type="submit" class="btn btn-primary">Create Record</button>
      </div>
    </form>`;
}

function submitCreateRecord(e) {
  e.preventDefault();
  const ent = db.entities.find(e2=>e2.id===selectedEntityId);
  if (!ent) return;
  const data = {};
  ent.fields.forEach(f => { const el = document.getElementById('r_'+f.name); if(el) data[f.name] = f.type==='number'||f.type==='currency'?Number(el.value):el.value; });
  db.records.push({ id:genId(), wsId, entityId:selectedEntityId, data, createdAt:now() });
  saveDB(db); closeModal(); toast('Record created');
}

function saveFlowAsAutomation() {

  db.automations.push({id:genId(), wsId, name, description:'Visual workflow with '+flowNodes.length+' nodes',

  genPreview = { ...tpl, industry:ind||'general', estimatedSetupTime:'45 seconds',
    componentCount:{entities:tpl.entities.length,bots:tpl.bots.length,agents:tpl.agents.length,automations:tpl.automations.length,websitePages:tpl.website.pages.length} };
  genStep = 'preview';

}

function deployGenerated() {
  genStep = 'deploying'; render();
  setTimeout(() => {
    const p = genPreview;
    p.entities.forEach(e => { db.entities.push({ id:genId(), wsId, name:e.name, displayName:e.displayName, icon:e.icon||'📁', color:e.color||'#6366f1', fields:e.fields, createdAt:now() }); });
    p.bots.forEach(b => { db.bots.push({ id:genId(), wsId, name:b.name, type:b.type, description:b.desc, channels:b.channels, active:true, createdAt:now() }); });
    p.agents.forEach(a => { db.agents.push({ id:genId(), wsId, name:a.name, role:a.role, description:a.desc, tools:a.tools, active:true, createdAt:now() }); });
    p.automations.forEach(a => { db.automations.push({ id:genId(), wsId, name:a.name, description:a.desc, trigger:a.trigger, active:false, executions:0, createdAt:now() }); });
    db.websites.push({ id:genId(), wsId, name:p.name, slug:p.name.toLowerCase().replace(/[^a-z0-9]+/g,'-'), published:false, pages:p.website.pages, createdAt:now() });
    saveDB(db);
    genStep = 'done'; render();
    toast('Business deployed successfully!');
  }, 1500);
}

function generateFakeLeads(industry, count) {
  const ind = INDUSTRY_LEADS[industry] || INDUSTRY_LEADS.dental;
  const leads = [];
  const cities = ['New York','Los Angeles','Chicago','Houston','Miami','London','Berlin','Paris','Tokyo','Moscow','Dubai','Singapore','Sydney','Toronto','Mumbai'];
  const domains = ['gmail.com','outlook.com','yahoo.com','company.com','business.org'];
  for (let i = 0; i < count; i++) {
    const prefix = ind.prefixes[Math.floor(Math.random()*ind.prefixes.length)];
    const suffix = ind.suffixes[Math.floor(Math.random()*ind.suffixes.length)];
    const name = prefix + suffix;
    const city = cities[Math.floor(Math.random()*cities.length)];
    const score = Math.floor(Math.random()*60)+40;
    const phone = '+1 '+Math.floor(Math.random()*900+100)+'-'+Math.floor(Math.random()*900+100)+'-'+Math.floor(Math.random()*9000+1000);
    const email = name.toLowerCase().replace(/[^a-z]/g,'').slice(0,12)+'@'+domains[Math.floor(Math.random()*domains.length)];
    const revenue = ['$100K-$500K','$500K-$1M','$1M-$5M','$5M-$10M','$10M+'][Math.floor(Math.random()*5)];
    const employees = ['1-10','11-50','51-200','201-500','500+'][Math.floor(Math.random()*5)];
    const hasWebsite = Math.random() > 0.3;
    const hasSocial = Math.random() > 0.4;
    leads.push({id:genId(),name,industry:ind.name,city,phone,email,score,revenue,employees,hasWebsite,hasSocial,
      source:LEAD_SOURCES.find(s=>s.id===leadsSource)?.name||'Google Maps',
      status:'new',createdAt:now(),notes:''});
  }
  return leads.sort((a,b)=>b.score-a.score);
}

function startLeadSearch() {
  leadsIndustry = document.getElementById('leadIndustry').value;
  leadsLocation = document.getElementById('leadLocation').value;
  leadsSource = document.getElementById('leadSource').value;
  if (!leadsIndustry) { toast('Please select an industry','error'); return; }
  leadsSearching = true;
  leadsSearchProgress = 0;
  leadsData = [];
  render();
  const interval = setInterval(() => {
    leadsSearchProgress += Math.floor(Math.random()*15)+5;
    if (leadsSearchProgress >= 100) {
      leadsSearchProgress = 100;
      leadsSearching = false;
      leadsData = generateFakeLeads(leadsIndustry, Math.floor(Math.random()*10)+8);
      clearInterval(interval);
      toast(`Found ${leadsData.length} qualified leads!`);
    }
    render();
  }, 400);
}

function contactLead(id) {
  const lead = leadsData.find(l=>l.id===id);
  if (lead) { lead.status = 'contacted'; saveDB(db); toast('Outreach sent to '+lead.name); render(); }
}

function qualifyLead(id) {
  const lead = leadsData.find(l=>l.id===id);
  if (lead) { lead.status = 'qualified'; saveDB(db); toast(lead.name+' qualified as hot lead!'); render(); }
}

function autoOutreach() {
  const newLeads = leadsData.filter(l=>l.status==='new');
  if (!newLeads.length) { toast('No new leads to contact','error'); return; }
  newLeads.forEach(l => l.status = 'contacted');
  saveDB(db);
  toast(`Auto-outreach sent to ${newLeads.length} leads!`);
  render();
}

function exportLeads() {
  const csv = 'Company,Score,Location,Phone,Email,Revenue,Employees,Source,Status\n'+
    leadsData.map(l=>`"${l.name}",${l.score},"${l.city}","${l.phone}","${l.email}","${l.revenue}","${l.employees}","${l.source}",${l.status}`).join('\n');
  const blob = new Blob([csv],{type:'text/csv'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='leads.csv'; a.click();
  toast('Exported '+leadsData.length+' leads');
}

function addFlowNode(type) {
  const nt = NODE_TYPES.find(n=>n.type===type);
  if (!nt) return;
  const node = {id:genId(), type:nt.type, icon:nt.icon, color:nt.color, label:nt.label, desc:nt.desc,
    x:100+Math.random()*300, y:80+flowNodes.length*80, config:{}};
  flowNodes.push(node);
  selectedNodeId = node.id;
  render();
}

function selectFlowNode(id) { selectedNodeId = id; render(); }

function deleteFlowNode(id) {
  flowNodes = flowNodes.filter(n=>n.id!==id);
  flowConnections = flowConnections.filter(c=>c.from!==id&&c.to!==id);
  if (selectedNodeId===id) selectedNodeId = null;
  render();
}

function startDragNode(e, id) {
  e.preventDefault();
  const node = flowNodes.find(n=>n.id===id);
  if (!node) return;
  draggingNode = id;
  const rect = e.target.closest('.flow-node').getBoundingClientRect();
  dragOffset = {x:e.clientX-rect.left, y:e.clientY-rect.top};
  selectedNodeId = id;
  render();
}

function onCanvasMouseMove(e) {
  if (!draggingNode) return;
  const canvas = e.target.closest('.flow-canvas');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  const node = flowNodes.find(n=>n.id===draggingNode);
  if (node) {
    node.x = Math.max(0, e.clientX - rect.left - dragOffset.x);
    node.y = Math.max(0, e.clientY - rect.top - dragOffset.y);
    render();
  }
}

function onCanvasMouseUp() { draggingNode = null; }

function connectNodes(fromId, toId) {
  if (fromId === toId) return;
  if (flowConnections.find(c=>c.from===fromId&&c.to===toId)) return;
  flowConnections.push({id:genId(), from:fromId, to:toId});
  render();
}

function renderFlowCanvas() {
  return `<div class="flow-canvas" onmousemove="onCanvasMouseMove(event)" onmouseup="onCanvasMouseUp()" style="min-height:450px">
    ${flowConnections.map(c=>{
      const from = flowNodes.find(n=>n.id===c.from);
      const to = flowNodes.find(n=>n.id===c.to);
      if (!from||!to) return '';
      const x1=from.x+80, y1=from.y+50, x2=to.x+80, y2=to.y;
      const mx=(x1+x2)/2, my=(y1+y2)/2;
      return `<svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none"><path d="M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}" stroke="#818cf8" stroke-width="2" fill="none"/><circle cx="${x2}" cy="${y2}" r="4" fill="#818cf8"/></svg>`;
    }).join('')}
    ${flowNodes.map(n=>`<div class="flow-node ${selectedNodeId===n.id?'selected':''}" style="left:${n.x}px;top:${n.y}px" onclick="selectFlowNode('${n.id}')" onmousedown="startDragNode(event,'${n.id}')">
      <div class="flow-node-header">
        <div class="flow-node-icon" style="background:${n.color}20;color:${n.color}">${n.icon}</div>
        <div><div class="flow-node-title">${n.label}</div><div class="flow-node-desc">${n.desc}</div></div>
      </div>
      <div class="flow-port flow-port-in" onclick="event.stopPropagation()"></div>
      <div class="flow-port flow-port-out" onclick="event.stopPropagation();connectNodes('${n.id}',prompt('Connect to node ID:'))"></div>
    </div>`).join('')}
    ${flowNodes.length===0?`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:14px">
      <div style="text-align:center"><p style="font-size:36px;margin-bottom:8px">⚡</p><p>Add nodes from the palette to build your workflow</p></div>
    </div>`:''}
  </div>`;
}

function renderNodePalette() {
  const categories = {trigger:'Triggers',action:'Actions',logic:'Logic',ai:'AI'};
  return Object.entries(categories).map(([cat,label])=>`
    <div style="margin-bottom:12px">
      <p style="font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${label}</p>
      <div class="node-palette">
        ${NODE_TYPES.filter(n=>n.category===cat).map(n=>`<div class="node-palette-item" onclick="addFlowNode('${n.type}')" draggable="true">
          <span style="color:${n.color}">${n.icon}</span><span>${n.label}</span>
        </div>`).join('')}
      </div>
    </div>`).join('');
}

function getAIResponse(msg) {
  const lower = msg.toLowerCase();
  if (lower.includes('lead') || lower.includes('find') || lower.includes('customer')) return AI_RESPONSES.lead;
  if (lower.includes('autom') || lower.includes('workflow') || lower.includes('trigger')) return AI_RESPONSES.automation;
  if (lower.includes('email') || lower.includes('campaign') || lower.includes('newsletter')) return AI_RESPONSES.email;
  if (lower.includes('report') || lower.includes('analytics') || lower.includes('summary') || lower.includes('stat')) return AI_RESPONSES.report;
  if (lower.includes('help') || lower.includes('what') || lower.includes('how')) return AI_RESPONSES.help;
  return AI_RESPONSES.default;
}

function sendAIMessage() {
  const input = document.getElementById('aiInput');
  if (!input || !input.value.trim()) return;
  const msg = input.value.trim();
  aiMessages.push({role:'user',content:msg});
  input.value = '';
  render();
  setTimeout(() => {
    aiMessages.push({role:'bot',content:getAIResponse(msg)});
    render();
    const chat = document.getElementById('aiChat');
    if (chat) chat.scrollTop = chat.scrollHeight;
  }, 800);
}

function renderAIChat() {
  return `<div style="background:white;border:1px solid #e2e8f0;border-radius:12px;padding:16px;height:100%;display:flex;flex-direction:column">
    <h3 style="font-weight:700;margin-bottom:12px;font-size:14px">🤖 AI Assistant</h3>
    <div id="aiChat" class="ai-chat" style="flex:1;overflow-y:auto;margin-bottom:12px">
      ${aiMessages.map(m=>`<div class="ai-msg ${m.role==='user'?'ai-msg-user':'ai-msg-bot'}">${m.content.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div>`).join('')}
    </div>
    <div style="display:flex;gap:8px">
      <input class="input" id="aiInput" placeholder="Ask me anything..." style="font-size:13px" onkeydown="if(event.key==='Enter')sendAIMessage()">
      <button class="btn btn-primary btn-sm" onclick="sendAIMessage()">Send</button>
    </div>
  </div>`;
}
