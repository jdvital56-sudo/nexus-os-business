version: '3.8'

services:
  # ─── Nexus OS App ───────────────────────────────────────────────
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./data/db.json
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - NEXT_PUBLIC_APP_URL=${APP_URL:-http://localhost:3000}
    volumes:
      - nexus-data:/app/.data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ─── Nginx Reverse Proxy ────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nexus-data:
